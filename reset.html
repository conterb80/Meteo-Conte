<!doctype html><html lang="it"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"><title>Meteo Conte V62 Reset</title><style>body{margin:0;background:#062533;color:white;font-family:system-ui;display:grid;place-items:center;min-height:100vh;text-align:center;padding:24px}button{font-size:20px;font-weight:800;border:0;border-radius:999px;padding:18px 28px;background:#85f27a;color:#062533}p{opacity:.8;font-size:18px;line-height:1.4}</style></head><body><div><h1>Meteo Conte V62</h1><p>Reset e apertura della Stato del giorno PRETEMP.<br>Premi il pulsante se non riparte da solo.</p><button onclick="go()">Aggiorna adesso</button></div><script>async function go(){try{if('serviceWorker' in navigator){const regs=await navigator.serviceWorker.getRegistrations();await Promise.all(regs.map(r=>r.unregister()));}if(window.caches){const keys=await caches.keys();await Promise.all(keys.map(k=>caches.delete(k)));}localStorage.removeItem('meteoConteData');}catch(e){}location.replace('./index.html?v=62-pretemp-stato-giorno&t='+Date.now());}go();</script></body></html>
